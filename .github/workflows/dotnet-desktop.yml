# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build, test, and zip a WPF or Windows Forms desktop application
# built on .NET Framework 4.7.1.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: .NET Framework Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: DBZ LotSS Editor.sln
      Reverse_Engineering_Solution_Name: Reverse-Engineering-Toolkit/Reverse Engineering Toolkit.sln
      Build_Configuration: Release
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Clone the external dependency where the solution expects it: adjacent to the editor, using the same parent folder
    - name: Clone Reverse-Engineering-Toolkit
      shell: bash
      run: |
        # Navigates "up" one level from your workspace root and clones the toolkit there
        cd ..
        git clone https://github.com/MakoInfused/Reverse-Engineering-Toolkit

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore NuGet Packages
    - name: Restore NuGet Packages
      run: |
        nuget restore "../${{ env.Reverse_Engineering_Solution_Name }}"
        nuget restore "${{ env.Solution_Name }}"

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test "${{ env.Solution_Name }}" --configuration ${{ env.Build_Configuration }}

    # Build the application
    - name: Build the external toolkit dependencies FIRST, then build the main app
      run: |
        msbuild "../${{ env.Reverse_Engineering_Solution_Name }}" /p:Configuration=${{ env.Build_Configuration }} /p:Platform="Any CPU"
        msbuild "${{ env.Solution_Name }}" /p:Configuration=${{ env.Build_Configuration }} /p:Platform="Any CPU"

    # Extract version from AssemblyInfo.cs
    - name: Extract Version Number
      id: get_version
      shell: powershell
      run: |
        # Adjust the path below if your AssemblyInfo.cs is located in a different subfolder
        $path = "DBZ-LotSS-Editor/DBZ LotSS Editor/My Project/AssemblyInfo.cs"
        
        # Search the file for the AssemblyVersion attribute line
        $line = Get-Content $path | Select-String -Pattern '\[assembly: AssemblyVersion\("(.*)"\)'
        
        if ($line -match 'AssemblyVersion\("([^"]+)"\)') {
            $version = $Matches[1]
            Write-Output "Extracted Version: $version"
            # Save directly to the step outputs context
            Add-Content -Path $env:GITHUB_OUTPUT -Value "APP_VERSION=$version"
        } else {
            Write-Output "Could not find version, defaulting to 1.0.0"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "APP_VERSION=1.0.0"
        }

    # Deploy the entire folder as a build artifact to GitHub
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DBZ-LotSS-Editor-Build-v${{ steps.get_version.outputs.APP_VERSION }}
        path: DBZ-LotSS-Editor/DBZ LotSS Editor/bin/${{ env.Build_Configuration }}/
